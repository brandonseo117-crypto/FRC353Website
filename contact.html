    <main class="page-shell">
        <section class="page-section contact-grid">
            <div>
                <p class="eyebrow">Get in touch</p>
                <h1 class="page-title">Contact the POBots</h1>
                <p class="page-text">We welcome questions from students, families, mentors, and community partners who
                    want to learn more or get involved.</p>
                <ul class="contact-list">
                    <li><strong>Email:</strong> <a href="mailto:pobots353@gmail.com">pobots353@gmail.com</a></li>
                </ul>
            </div>

            <form class="card contact-form">
                <label for="name">Name</label>
                <input id="name" type="text" placeholder="">
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="">
                <label for="message">Message</label>
                <textarea id="message" rows="5" placeholder="Write your message here"></textarea>
                <button type="submit">Submit</button>
            </form>
        </section>
